name: cd

on:
  push: 
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      
      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Build the App
        run: ./scripts/buildprod.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: Build the docker image and push to Google Artifact Registry at GCP
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-492514/notely-ar-repo/notely:0.1 .
      
      - name: Run Migrations
        run: ./scripts/migrateup.sh

      - name: Deploy to Google Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-492514/notely-ar-repo/notely:0.1 --region us-central1 --allow-unauthenticated --project notely-492514 --max-instances=4